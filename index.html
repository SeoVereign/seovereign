<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SEOVEREIGN</title>
	<link rel="shortcut icon" href="/favicon.ico">
	<link rel="stylesheet" type="text/css" href="/css/style.css" />
</head>
<body>
	<!-- Custom Cursor -->
	<div class="custom-cursor"></div>

	<!-- Mobile warning screen -->
	<div id="mobile-warning" class="mobile-warning">
		<div class="mobile-warning-content">
			<div class="mobile-warning-symbol">
				<img src="/images/symbol.png" alt="SEOVEREIGN Symbol">
			</div>
			<div class="mobile-warning-text">
				<h1>SEOVEREIGN</h1>
				<p>This experience is designed for desktop viewing.</p>
				<p>Please visit us on your desktop for the full experience.</p>
				<div class="mobile-warning-footer">
					<p>데스크탑에서 최적의 경험을 제공합니다</p>
				</div>
			</div>
		</div>
	</div>

	<!-- Main content (hidden on mobile) -->
	<div id="main-content" class="main-content">
		<article class="smoother-wrapper">
			<main class="smoother-contents">
				<section class="introduce">
					<div class="inner">
						<div class="contents">
							<div class="row">
								<div class="left-box">
									<div class="top-text">
										<p>LET US INTRODUCE WHO WE ARE.</p>
									</div>
									<div class="top y-down">
	<img src="/images/img_introduce_02_1.jpg" alt="img">
									</div>
									<div class="texts">
										<div class="text-marquee">
											<div class="text-marquee-inner">
											</div>
										</div>
									</div>
									<div class="bottom x-left">
										<img src="/images/img_introduce_02_2.jpg" alt="img">
									</div>
								</div>
								<div class="vertical-slide">
									<div class="to-up">
										<div class="inner">
											<span><img src="/texts/text_niladmiraria.svg" alt="nil admirari"></span>
											<span><img src="/texts/text_nostos.svg" alt="nostos"></span>
											<span><img src="/texts/text_eunoia.svg" alt="eunoia"></span>
										</div>
										<div class="inner">
											<span><img src="/texts/text_niladmiraria.svg" alt="nil admirari"></span>
											<span><img src="/texts/text_nostos.svg" alt="nostos"></span>
											<span><img src="/texts/text_eunoia.svg" alt="eunoia"></span>
										</div>
									</div>
								</div>
								<div class="right-box x-right">
									<figure class="img"><img src="/images/img_introduce_01.jpg" alt="img"></figure>
								</div>
							</div>
							<div class="intro">
								<div class="inner">
									<figure class="symbol intro-symbol" style="display: block !important;"><img src="/images/symbol.png" alt="symbol"></figure>
									<figure class="seovereign"><img src="/images/seovereign.png" alt="seovereign"><figure>
								</div>
							</div>
						</div>
						<div class="bottom-text">
							<p>
								HEY THERE, WE'RE SEOVEREIGN – THE #1 <br>TRADINGVIEW KOREA CHANNEL IN 2025
							</p>
						</div>
					</div>
				</section>
				<!-- 나머지 생략 -->
			</main>
		</article>
	</div>

	<script type="module" src="/js/index.js"></script>
</body>
</html>
